# sneakerhead/nginx-gateway/nginx.conf
events {
    worker_connections 1024;
}

http {
    gzip on;
    gzip_types text/plain application/json;
    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    upstream user_service    { server user-service:8001; }
    upstream product_service { server product-service:8002; }
    upstream order_service   { server order-service:8003; }
    upstream frontend        { server frontend-service:80; }

    server {
        listen 80;

        # ── User Service ─────────────────────────
        location /api/v1/auth {
            proxy_pass http://user_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users {
            proxy_pass http://user_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Product Service ──────────────────────
        location /api/v1/products {
            proxy_pass http://product_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Order Service ────────────────────────
        location /api/v1/cart {
            proxy_pass http://order_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/orders {
            proxy_pass http://order_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health ───────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Frontend (catch-all) ─────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
