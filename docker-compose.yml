# sneakerhead/docker-compose.yml (separated databases)

services:

  # ── Dedicated PostgreSQL for User Service ──────────
  user-postgres:
    image: postgres:16-alpine
    container_name: sneakerhead-user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER} -d ${USER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Dedicated PostgreSQL for Product Service ───────
  product-postgres:
    image: postgres:16-alpine
    container_name: sneakerhead-product-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PRODUCT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PRODUCT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PRODUCT_POSTGRES_DB}
    volumes:
      - product_postgres_data:/var/lib/postgresql/data
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_POSTGRES_USER} -d ${PRODUCT_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Dedicated PostgreSQL for Order Service ─────────
  order-postgres:
    image: postgres:16-alpine
    container_name: sneakerhead-order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORDER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORDER_POSTGRES_DB}
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_POSTGRES_USER} -d ${ORDER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: sneakerhead-user-service
    image: yaswanthreddy1602/sneakerhead-user-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: sneakerhead-product-service
    image: yaswanthreddy1602/sneakerhead-product-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${PRODUCT_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      product-postgres:
        condition: service_healthy
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: sneakerhead-order-service
    image: yaswanthreddy1602/sneakerhead-order-service:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      order-postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: sneakerhead-frontend
    image: yaswanthreddy1602/sneakerhead-frontend:latest
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - sneakerhead-network

  nginx-gateway:
    image: nginx:alpine
    container_name: sneakerhead-nginx-gateway
    restart: unless-stopped
    volumes:
      - ./nginx-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_PORT:-80}:80"
    depends_on:
      - frontend-service
      - user-service
      - product-service
      - order-service
    networks:
      - sneakerhead-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  user_postgres_data:
    driver: local
  product_postgres_data:
    driver: local
  order_postgres_data:
    driver: local

networks:
  sneakerhead-network:
    driver: bridge
